[tools]
node = "24.14.1"

[tasks."frontend:install"]
run = 'npm install'

[tasks."frontend:generate"]
depends = ["frontend:install"]
run = 'npm run generate'

[tasks."frontend:dev:up"]
depends = ["frontend:install", "frontend:generate"]
run = 'npm run dev'

[tasks."frontend:dev:up".env]
BACKEND_URL = "http://localhost:8080"

[tasks."frontend:lint"]
depends = ["frontend:install"]
run = 'npm run lint'

[tasks."frontend:typecheck"]
depends = ["frontend:install"]
run = 'npx tsc --noEmit'

[tasks."frontend:test"]
depends = ["frontend:install"]
run = 'npx vitest run'
