[tools]
node = "24.14.1"

[tasks."frontend:install"]
run = 'npm install'

[tasks."frontend:dev:up"]
depends = ["frontend:install"]
run = 'npm run dev'

[tasks."frontend:lint"]
depends = ["frontend:install"]
run = 'npm run lint'

[tasks."frontend:typecheck"]
depends = ["frontend:install"]
run = 'npx tsc --noEmit'

[tasks."frontend:test"]
depends = ["frontend:install"]
run = 'npx vitest run'
