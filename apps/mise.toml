[tasks."test:cc-remote-agent"]
dir = "cc-remote-agent"
run = 'mise run cc-remote-agent:test'

[tasks."dev:up"]
description = "Start infra (postgres + cc-remote-agent-auth) for local host development"
run = '''
#!/usr/bin/env bash
set -euo pipefail
shopt -s inherit_errexit

echo "Building cc-remote-agent image..."
docker compose -f prepare.compose.yaml build

echo "Starting infrastructure (postgres + cc-remote-agent-auth)..."
docker compose up -d --remove-orphans

echo ""
echo "Infrastructure ready. Run in separate terminals:"
echo "  Terminal 1: cd cc-tunnel && mise run cc-tunnel:dev:up"
echo "  Terminal 2: cd frontend && mise run frontend:dev:up"
'''

[tasks."docker:up"]
description = "Start all services with docker compose"
# sources = ["**/*"]
# outputs = { auto = true }
run = '''
#!/usr/bin/env bash
set -euo pipefail

docker compose -f prepare.compose.yaml build

docker compose -f compose.yaml --profile full up --build -d

echo 'Access to http://localhost:3000 (if default configuration is used) to see the frontend.'
'''

[tasks."docker:down"]
description = "Stop all services with docker compose"
run = 'docker compose down -v'

[tasks."docker:logs"]
description = "Follow logs of all services with docker compose"
run = 'docker compose logs -f'

[tasks."test:cc-login"]
dir = "cc-login"
run = 'mise run cc-login:test'

[tasks."test:cc-tunnel"]
dir = "cc-tunnel"
run = 'mise run cc-tunnel:test'

[tasks."test:frontend"]
dir = "frontend"
run = 'mise run frontend:test'

[tasks."test"]
depends = ["test:*"]

[tasks."lint:cc-remote-agent"]
dir = "cc-remote-agent"
run = 'mise run cc-remote-agent:lint'

[tasks."lint:cc-login"]
dir = "cc-login"
run = 'mise run cc-login:lint'

[tasks."lint:cc-tunnel"]
dir = "cc-tunnel"
run = 'mise run cc-tunnel:lint'

[tasks."lint:frontend"]
dir = "frontend"
run = 'mise run frontend:lint'

[tasks."lint"]
depends = ["lint:*"]

[tasks."check"]
depends = ["test", "lint"]
