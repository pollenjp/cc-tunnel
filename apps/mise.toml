[tasks."test:cc-tunnel"]
dir = "cc-tunnel"
run = 'mise run cc-tunnel:test'

[tasks."test:cc-tmux-tunnel"]
dir = "cc-tmux-tunnel"
run = 'mise run cc-tmux-tunnel:test'

[tasks."test:frontend"]
dir = "frontend"
run = 'mise run frontend:test'

[tasks."test"]
depends = ["test:*"]

[tasks."lint:cc-tunnel"]
dir = "cc-tunnel"
run = 'mise run cc-tunnel:lint'

[tasks."lint:cc-tmux-tunnel"]
dir = "cc-tmux-tunnel"
run = 'mise run cc-tmux-tunnel:lint'

[tasks."lint:frontend"]
dir = "frontend"
run = 'mise run frontend:lint'

[tasks."lint"]
depends = ["lint:*"]

[tasks."check"]
depends = ["test", "lint"]
