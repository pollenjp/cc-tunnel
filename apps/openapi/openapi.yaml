openapi: "3.0.3"
info:
  title: cc-tunnel API
  description: API for controlling Claude Code CLI sessions via tmux
  version: 0.3.0

paths:
  /sessions:
    post:
      operationId: createSession
      summary: Create a new session
      description: |
        Creates a new session. For claude_code type, creates a new tmux session and starts Claude Code CLI.
        For multi_agent_shogun type, starts the shogun startup script or adopts existing sessions.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: listSessions
      summary: List all sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"

  /sessions/discover:
    get:
      operationId: discoverSessions
      summary: Discover existing unmanaged tmux sessions
      description: |
        Lists tmux sessions that exist but are not currently managed.
        Returns claude-* sessions and shogun/multiagent session pairs.
      responses:
        "200":
          description: List of discoverable sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiscoveredSession"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sessions/{sessionId}:
    delete:
      operationId: deleteSession
      summary: Delete a session
      description: Kills the tmux session(s) and removes it from management.
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sessions/{sessionId}/resize:
    post:
      operationId: resizeSession
      summary: Resize the tmux window
      description: Resizes the tmux window of a running session.
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResizeRequest"
      responses:
        "200":
          description: Session resized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sessions/{sessionId}/input:
    post:
      operationId: sendInput
      summary: Send input to a session
      description: |
        Sends keystrokes to the tmux session via send-keys.
        Each element in the `keys` array is passed as a separate argument to `tmux send-keys`.
        Plain text is sent as literal characters. Special key names are interpreted by tmux.

        Supported special keys include: Enter, Escape, Space, Tab, BSpace (Backspace),
        Up, Down, Left, Right, Home, End, PageUp (PgUp), PageDown (PgDn),
        F1-F12, IC (Insert), DC (Delete).

        Modifier prefixes: C- (Ctrl), M- (Alt/Meta), S- (Shift).
        Examples: "C-c" (Ctrl+C), "C-a" (Ctrl+A), "M-x" (Alt+X), "C-S-Up" (Ctrl+Shift+Up).
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/PaneIndex"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendInputRequest"
      responses:
        "200":
          description: Input sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sessions/{sessionId}/output:
    get:
      operationId: getOutput
      summary: Get session output
      description: Captures the current tmux pane content.
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/PaneIndex"
      responses:
        "200":
          description: Pane output
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutputResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sessions/{sessionId}/outputs:
    get:
      operationId: getAllOutputs
      summary: Get all pane outputs
      description: Captures the content of all panes in the session.
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: All pane outputs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AllOutputsResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string

    PaneIndex:
      name: paneIndex
      in: query
      required: false
      description: |
        Pane index to target. For claude_code sessions, only 0 is valid.
        For multi_agent_shogun sessions: 0 = shogun pane, 1-9 = multiagent panes.
      schema:
        type: integer
        minimum: 0
        maximum: 9
        default: 0

  schemas:
    SessionType:
      type: string
      enum:
        - claude_code
        - multi_agent_shogun

    CreateSessionRequest:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/SessionType"
          default: claude_code
        tmux_name:
          type: string
          description: Existing tmux session name to adopt (for claude_code type)
        width:
          type: integer
          description: tmux window width in columns
          default: 200
          minimum: 40
          maximum: 500
          example: 200
        height:
          type: integer
          description: tmux window height in rows
          default: 50
          minimum: 10
          maximum: 200
          example: 50

    Session:
      type: object
      required:
        - id
        - type
        - tmux_name
        - pane_count
        - created_at
      properties:
        id:
          type: string
          example: "a1b2c3d4e5f6g7h8"
        type:
          $ref: "#/components/schemas/SessionType"
        tmux_name:
          type: string
          example: "claude-a1b2c3d4e5f6g7h8"
        pane_count:
          type: integer
          description: Number of panes (1 for claude_code, 10 for multi_agent_shogun)
          example: 1
        created_at:
          type: string
          format: date-time

    DiscoveredSession:
      type: object
      required:
        - type
        - tmux_names
      properties:
        type:
          $ref: "#/components/schemas/SessionType"
        tmux_names:
          type: array
          items:
            type: string
          description: Tmux session names (1 for claude_code, 2 for multi_agent_shogun)

    ResizeRequest:
      type: object
      required:
        - width
        - height
      properties:
        width:
          type: integer
          description: tmux window width in columns
          minimum: 40
          maximum: 500
          example: 200
        height:
          type: integer
          description: tmux window height in rows
          minimum: 10
          maximum: 200
          example: 50

    SendInputRequest:
      type: object
      required:
        - keys
      properties:
        keys:
          type: array
          items:
            type: string
          description: |
            Array of keys to send to the tmux session.
            Each element is passed as a separate argument to `tmux send-keys`.
            Plain text strings are sent as literal input.
            Special key names (Enter, Escape, C-c, etc.) are interpreted by tmux.
          example: ["hello", "Enter"]

    OutputResponse:
      type: object
      required:
        - output
      properties:
        output:
          type: string

    AllOutputsResponse:
      type: object
      required:
        - panes
      properties:
        panes:
          type: object
          additionalProperties:
            type: string
          description: Map of pane index (as string key) to output content

    StatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: "ok"

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
