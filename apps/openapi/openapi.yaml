openapi: "3.0.3"
info:
  title: cc-tunnel API
  description: AI chat session management via claude CLI
  version: 1.0.0

paths:
  /auth/status:
    get:
      operationId: GetAuthStatus
      summary: Get authentication status
      responses:
        "200":
          description: Authentication status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"

  /auth/login:
    post:
      operationId: InitiateLogin
      summary: Initiate login flow
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /auth/logout:
    post:
      operationId: Logout
      summary: Logout
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"

  /auth/cancel:
    post:
      operationId: CancelLogin
      summary: Cancel the in-progress login PTY process
      responses:
        "200":
          description: Login cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthCancelResponse"

  /auth/input:
    post:
      operationId: SubmitAuthInput
      summary: Submit input to the login process stdin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthInputRequest"
      responses:
        "200":
          description: Input submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthInputResponse"
        "409":
          description: No login in progress

  /auth/output:
    get:
      operationId: GetAuthOutput
      summary: Get buffered stdout from the login process
      parameters:
        - name: since
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Cursor position to start from (0 = all lines)
      responses:
        "200":
          description: Stdout lines and new cursor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthOutputResponse"

  /conversations:
    post:
      operationId: createConversation
      summary: Create a new conversation
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationRequest"
      responses:
        "201":
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: listConversations
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  /conversations/{conversationId}:
    get:
      operationId: getConversation
      summary: Get conversation with message history
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteConversation
      summary: Delete a conversation
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /conversations/{conversationId}/messages:
    post:
      operationId: sendMessage
      summary: Send a message and stream the assistant response
      description: |
        Sends a user message to the conversation and streams the assistant
        response as Server-Sent Events (SSE).
        Response Content-Type: text/event-stream
        Each SSE event has format: data: <json>\n\n
        Event types: {"type":"text","content":"..."} | {"type":"done","session_id":"...","cost_usd":0.01} | {"type":"error","message":"..."}
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: SSE stream of assistant response
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  parameters:
    ConversationId:
      name: conversationId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    AuthStatus:
      type: object
      required:
        - loggedIn
        - authMethod
        - loginPending
      properties:
        loggedIn:
          type: boolean
        authMethod:
          type: string
          enum: [none, api_key, claude.ai]
        apiProvider:
          type: string
        email:
          type: string
        orgName:
          type: string
        subscriptionType:
          type: string
        apiKeySource:
          type: string
        loginPending:
          type: boolean
        loginUrl:
          type: string

    LoginRequest:
      type: object
      properties:
        method:
          type: string
          enum: [claudeai, console]

    LoginResponse:
      type: object
      required:
        - message
      properties:
        loginUrl:
          type: string
        loggedIn:
          type: boolean
        message:
          type: string

    AuthInputRequest:
      type: object
      required: [input]
      properties:
        input:
          type: string
          description: Input to send to the login process stdin (can be empty string for Enter)

    AuthInputResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    AuthOutputResponse:
      type: object
      required: [data, cursor]
      properties:
        data:
          type: string
          description: Base64-encoded PTY output bytes since the given cursor
        cursor:
          type: integer
          description: New cursor position for the next request

    AuthCancelResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    CreateConversationRequest:
      type: object
      properties:
        title:
          type: string
          default: ""
        model:
          type: string
          default: "claude-sonnet-4-6"
        system_prompt:
          type: string

    Conversation:
      type: object
      required:
        - id
        - title
        - model
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        model:
          type: string
        status:
          type: string
          enum: [idle, running, completed]
          description: Execution status of the conversation
        system_prompt:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Message:
      type: object
      required:
        - id
        - conversation_id
        - role
        - created_at
      properties:
        id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant, system]
        message_data:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [streaming, completed, error]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ConversationDetail:
      allOf:
        - $ref: "#/components/schemas/Conversation"
        - type: object
          required:
            - messages
          properties:
            messages:
              type: array
              items:
                $ref: "#/components/schemas/Message"

    SendMessageRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          description: User message content

    StatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: "ok"

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string

    ToolCallData:
      type: object
      required:
        - tool_use_id
        - tool_name
        - input_json
      properties:
        tool_use_id:
          type: string
        tool_name:
          type: string
        input_json:
          type: string
        result:
          type: string
          nullable: true
        is_running:
          type: boolean

    SSETextEvent:
      type: object
      required: [type, content]
      properties:
        type:
          type: string
          enum: [text]
        content:
          type: string

    SSEThinkingEvent:
      type: object
      required: [type, content]
      properties:
        type:
          type: string
          enum: [thinking]
        content:
          type: string

    SSETextDeltaEvent:
      type: object
      required: [type, content]
      properties:
        type:
          type: string
          enum: [text_delta]
        content:
          type: string

    SSEThinkingDeltaEvent:
      type: object
      required: [type, content]
      properties:
        type:
          type: string
          enum: [thinking_delta]
        content:
          type: string

    SSEToolUseStartEvent:
      type: object
      required: [type, index, tool_use_id, tool_name]
      properties:
        type:
          type: string
          enum: [tool_use_start]
        index:
          type: integer
        tool_use_id:
          type: string
        tool_name:
          type: string

    SSEToolInputDeltaEvent:
      type: object
      required: [type, index, partial_json]
      properties:
        type:
          type: string
          enum: [tool_input_delta]
        index:
          type: integer
        partial_json:
          type: string

    SSEToolResultEvent:
      type: object
      required: [type, tool_use_id, content]
      properties:
        type:
          type: string
          enum: [tool_result]
        tool_use_id:
          type: string
        content:
          type: string

    SSEInitEvent:
      type: object
      required: [type, model, session_id]
      properties:
        type:
          type: string
          enum: [init]
        model:
          type: string
        session_id:
          type: string

    SSEHookEvent:
      type: object
      required: [type, subtype]
      properties:
        type:
          type: string
          enum: [hook_event]
        subtype:
          type: string
        hook_id:
          type: string
        hook_name:
          type: string
        hook_event:
          type: string
        session_id:
          type: string

    SSERateLimitEvent:
      type: object
      required: [type, status, resets_at, rate_limit_type]
      properties:
        type:
          type: string
          enum: [rate_limit]
        status:
          type: string
        resets_at:
          type: integer
        rate_limit_type:
          type: string

    SSECostEvent:
      type: object
      required: [type, total_cost_usd, duration_ms]
      properties:
        type:
          type: string
          enum: [cost]
        total_cost_usd:
          type: number
          format: double
        duration_ms:
          type: integer
          format: int64

    SSEDoneEvent:
      type: object
      required: [type, session_id, cost_usd]
      properties:
        type:
          type: string
          enum: [done]
        session_id:
          type: string
        cost_usd:
          type: number
          format: double

    SSEErrorEvent:
      type: object
      required: [type, message]
      properties:
        type:
          type: string
          enum: [error]
        message:
          type: string
