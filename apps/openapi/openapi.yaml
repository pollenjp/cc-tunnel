openapi: "3.0.3"
info:
  title: cc-tunnel API
  description: API for controlling Claude Code CLI sessions via tmux
  version: 0.2.0

paths:
  /sessions:
    post:
      operationId: createSession
      summary: Create a new Claude Code session
      description: Creates a new tmux session and starts Claude Code CLI in interactive mode.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: listSessions
      summary: List all sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"

  /sessions/{sessionId}:
    delete:
      operationId: deleteSession
      summary: Delete a session
      description: Kills the tmux session and removes it from management.
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sessions/{sessionId}/input:
    post:
      operationId: sendInput
      summary: Send input to a session
      description: |
        Sends keystrokes to the tmux session via send-keys.
        Each element in the `keys` array is passed as a separate argument to `tmux send-keys`.
        Plain text is sent as literal characters. Special key names are interpreted by tmux.

        Supported special keys include: Enter, Escape, Space, Tab, BSpace (Backspace),
        Up, Down, Left, Right, Home, End, PageUp (PgUp), PageDown (PgDn),
        F1-F12, IC (Insert), DC (Delete).

        Modifier prefixes: C- (Ctrl), M- (Alt/Meta), S- (Shift).
        Examples: "C-c" (Ctrl+C), "C-a" (Ctrl+A), "M-x" (Alt+X), "C-S-Up" (Ctrl+Shift+Up).
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendInputRequest"
      responses:
        "200":
          description: Input sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sessions/{sessionId}/output:
    get:
      operationId: getOutput
      summary: Get session output
      description: Captures the current tmux pane content.
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Pane output
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutputResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string

  schemas:
    CreateSessionRequest:
      type: object
      properties:
        width:
          type: integer
          description: tmux window width in columns
          default: 200
          minimum: 40
          maximum: 500
          example: 200
        height:
          type: integer
          description: tmux window height in rows
          default: 50
          minimum: 10
          maximum: 200
          example: 50

    Session:
      type: object
      required:
        - id
        - tmux_name
        - created_at
      properties:
        id:
          type: string
          example: "a1b2c3d4e5f6g7h8"
        tmux_name:
          type: string
          example: "claude-a1b2c3d4e5f6g7h8"
        created_at:
          type: string
          format: date-time

    SendInputRequest:
      type: object
      required:
        - keys
      properties:
        keys:
          type: array
          items:
            type: string
          description: |
            Array of keys to send to the tmux session.
            Each element is passed as a separate argument to `tmux send-keys`.
            Plain text strings are sent as literal input.
            Special key names (Enter, Escape, C-c, etc.) are interpreted by tmux.
          example: ["hello", "Enter"]

    OutputResponse:
      type: object
      required:
        - output
      properties:
        output:
          type: string

    StatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: "ok"

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
