openapi: "3.0.3"
info:
  title: cc-tunnel API
  description: AI chat session management via claude CLI
  version: 1.0.0

paths:
  /auth/status:
    get:
      operationId: GetAuthStatus
      summary: Get authentication status
      responses:
        "200":
          description: Authentication status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"

  /auth/login:
    post:
      operationId: InitiateLogin
      summary: Initiate login flow
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /auth/logout:
    post:
      operationId: Logout
      summary: Logout
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"

  /auth/cancel:
    post:
      operationId: CancelLogin
      summary: Cancel the in-progress login PTY process
      responses:
        "200":
          description: Login cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthCancelResponse"

  /auth/input:
    post:
      operationId: SubmitAuthInput
      summary: Submit input to the login process stdin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthInputRequest"
      responses:
        "200":
          description: Input submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthInputResponse"
        "409":
          description: No login in progress

  /auth/output:
    get:
      operationId: GetAuthOutput
      summary: Get buffered stdout from the login process
      parameters:
        - name: since
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Cursor position to start from (0 = all lines)
      responses:
        "200":
          description: Stdout lines and new cursor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthOutputResponse"

  /app-auth/login:
    post:
      operationId: AppAuthLogin
      summary: Login with username
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppAuthLoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppAuthLoginResponse"

  /app-auth/me:
    get:
      operationId: AppAuthGetMe
      summary: Get current user info
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppAuthMeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppAuthError"
    patch:
      operationId: AppAuthUpdateMe
      summary: Update current user info
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppAuthUpdateMeRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppAuthMeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppAuthError"

  /app-auth/logout:
    post:
      operationId: AppAuthLogout
      summary: Logout
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Logout successful

  /credentials/relogin/start:
    post:
      operationId: PostReloginStart
      summary: Start a re-login flow for a conversation session
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReloginStartRequest"
      responses:
        "200":
          description: Session container ready for re-login
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReloginStartResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /credentials/relogin/finalize:
    post:
      operationId: PostReloginFinalize
      summary: Finalize re-login and store the new credentials
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReloginFinalizeRequest"
      responses:
        "200":
          description: Credentials stored successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReloginFinalizeResponse"
        "400":
          description: Credentials not ready (login not completed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Bad gateway (error communicating with session container)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /conversations:
    post:
      operationId: createConversation
      summary: Create a new conversation
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationRequest"
      responses:
        "201":
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: listConversations
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  /conversations/{conversationId}:
    get:
      operationId: getConversation
      summary: Get conversation with message history
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteConversation
      summary: Delete a conversation
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /conversations/{conversationId}/messages:
    post:
      operationId: sendMessage
      summary: Send a message and process the assistant response asynchronously
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "202":
          description: Message accepted for processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  parameters:
    ConversationId:
      name: conversationId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    AppUser:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string

    AppAuthLoginRequest:
      type: object
      required:
        - username
      properties:
        username:
          type: string

    AppAuthLoginResponse:
      type: object
      required:
        - token
        - user
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/AppUser"

    AppAuthMeResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/AppUser"

    AppAuthUpdateMeRequest:
      type: object
      required:
        - nickname
      properties:
        nickname:
          type: string

    AppAuthError:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    AuthStatus:
      type: object
      required:
        - loggedIn
        - authMethod
        - loginPending
      properties:
        loggedIn:
          type: boolean
        authMethod:
          type: string
          enum: [none, api_key, claude.ai]
        apiProvider:
          type: string
        email:
          type: string
        orgName:
          type: string
        subscriptionType:
          type: string
        apiKeySource:
          type: string
        loginPending:
          type: boolean
        loginUrl:
          type: string

    LoginRequest:
      type: object
      properties:
        method:
          type: string
          enum: [claudeai, console]

    LoginResponse:
      type: object
      required:
        - message
      properties:
        loginUrl:
          type: string
        loggedIn:
          type: boolean
        message:
          type: string

    AuthInputRequest:
      type: object
      required: [input]
      properties:
        input:
          type: string
          description: Input to send to the login process stdin (can be empty string for Enter)

    AuthInputResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    AuthOutputResponse:
      type: object
      required: [data, cursor]
      properties:
        data:
          type: string
          description: Base64-encoded PTY output bytes since the given cursor
        cursor:
          type: integer
          description: New cursor position for the next request

    AuthCancelResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    CreateConversationRequest:
      type: object
      properties:
        title:
          type: string
          default: ""
        model:
          type: string
          default: "claude-sonnet-4-6"
        system_prompt:
          type: string
        execution_mode:
          type: string
          enum: [local, cloud_run_sandbox, docker_gce]
          default: local
          description: "実行環境の選択（デフォルト: local）"

    Conversation:
      type: object
      required:
        - id
        - title
        - model
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        model:
          type: string
        status:
          type: string
          enum: [idle, running, completed]
          description: Execution status of the conversation
        system_prompt:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Message:
      type: object
      required:
        - id
        - conversation_id
        - role
        - created_at
      properties:
        id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant, system]
        message_data:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [streaming, completed, error]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ConversationDetail:
      allOf:
        - $ref: "#/components/schemas/Conversation"
        - type: object
          required:
            - messages
          properties:
            messages:
              type: array
              items:
                $ref: "#/components/schemas/Message"

    SendMessageRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          description: User message content

    SendMessageResponse:
      type: object
      required: [message_id]
      properties:
        message_id:
          type: string
          format: uuid

    StatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: "ok"

    ReloginStartRequest:
      type: object
      required:
        - conversationId
      properties:
        conversationId:
          type: string
          format: uuid

    ReloginStartResponse:
      type: object
      required:
        - ready
      properties:
        ready:
          type: boolean

    ReloginFinalizeRequest:
      type: object
      required:
        - conversationId
      properties:
        conversationId:
          type: string
          format: uuid

    ReloginFinalizeResponse:
      type: object
      required:
        - registered
        - isValid
      properties:
        registered:
          type: boolean
        isValid:
          type: boolean

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string

    ToolCallData:
      type: object
      required:
        - tool_use_id
        - tool_name
        - input_json
      properties:
        tool_use_id:
          type: string
        tool_name:
          type: string
        input_json:
          type: string
        result:
          type: string
          nullable: true
        is_running:
          type: boolean

