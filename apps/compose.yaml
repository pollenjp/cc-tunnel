name: apps
services:
  postgres:
    image: mirror.gcr.io/library/postgres:18-alpine
    environment:
      POSTGRES_DB: cctunnel
      POSTGRES_USER: cctunnel
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-cctunnel_dev}"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cctunnel -d cctunnel"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    ports:
      - "127.0.0.1:5432:5432"
    expose:
      - "5432"

  cc-remote-agent-auth:
    image: cc-remote-agent:latest
    environment:
      PORT: "${CC_REMOTE_AGENT_AUTH_PORT:-9091}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    volumes:
      - claude-sessions:/home/user/.claude
    ports:
      - "127.0.0.1:${CC_REMOTE_AGENT_AUTH_PORT:-9091}:${CC_REMOTE_AGENT_AUTH_PORT:-9091}"
    expose:
      - "${CC_REMOTE_AGENT_AUTH_PORT:-9091}"

  cc-tunnel:
    build:
      context: ./cc-tunnel
    command:
      - -agent-url
      - http://cc-remote-agent-auth:${CC_REMOTE_AGENT_AUTH_PORT:-9091}
    environment:
      PORT: ${CC_TUNNEL_ENV_PORT:-8080}
      DATABASE_URL: "postgres://cctunnel:${POSTGRES_PASSWORD:-cctunnel_dev}@postgres:5432/cctunnel?sslmode=disable"
      EXECUTION_PROVIDER: local
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "${CC_TUNNEL_ENV_PORT:-8080}"
    ports: # To allow access from Vite running manually (not in Compose)
      - "8080:${CC_TUNNEL_ENV_PORT:-8080}"
    depends_on:
      cc-remote-agent-auth:
        condition: service_started
      postgres:
        condition: service_healthy

  frontend:
    profiles:
      - full
    build:
      context: ./frontend
    environment:
      PORT: "${FRONTEND_ENV_PORT:-8080}"
      BACKEND_URL: "/api"
      # for nginx configuration in frontend Dockerfile
      API_UPSTREAM: "http://cc-tunnel:${CC_TUNNEL_ENV_PORT:-8080}"
    ports:
      - "3000:${FRONTEND_ENV_PORT:-8080}"
    depends_on:
      cc-tunnel:
        condition: service_started

volumes:
  pgdata:
  claude-sessions:
    name: claude-sessions
