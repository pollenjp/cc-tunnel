name: apps
services:
  postgres:
    image: mirror.gcr.io/library/postgres:18-alpine
    environment:
      POSTGRES_DB: cctunnel
      POSTGRES_USER: cctunnel
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-cctunnel_dev}"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cctunnel -d cctunnel"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    ports:
      - "127.0.0.1:5432:5432"
    expose:
      - "5432"

  # container-manager is the only client of /var/run/docker.sock. cc-tunnel
  # talks to it via HTTP on port 9090. New cc-remote-agent containers it
  # creates join the apps_default network so cc-tunnel can reach them by
  # container name (DEFAULT_NETWORK below).
  container-manager:
    image: container-manager:latest
    pull_policy: never # built locally via prepare.compose.yaml
    environment:
      PORT: "9090"
      DEFAULT_NETWORK: apps_default
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "9090"

  cc-tunnel:
    build:
      context: ./cc-tunnel
    environment:
      PORT: ${CC_TUNNEL_ENV_PORT:-8080}
      DATABASE_URL: "postgres://cctunnel:${POSTGRES_PASSWORD:-cctunnel_dev}@postgres:5432/cctunnel?sslmode=disable"
      EXECUTION_PROVIDER: local
      CONTAINER_MANAGER_URL: "http://container-manager:9090"
      CC_LOGIN_ENCRYPTION_KEY: "${CC_LOGIN_ENCRYPTION_KEY:-012345678901234567890123456789012345678901234567890123456789abcd}"
    expose:
      - "${CC_TUNNEL_ENV_PORT:-8080}"
    ports: # To allow access from Vite running manually (not in Compose)
      - "8080:${CC_TUNNEL_ENV_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
      container-manager:
        condition: service_started

  frontend:
    profiles:
      - full
    build:
      context: ./frontend
    environment:
      PORT: "${FRONTEND_ENV_PORT:-8080}"
      BACKEND_URL: "/api"
      # for nginx configuration in frontend Dockerfile
      API_UPSTREAM: "http://cc-tunnel:${CC_TUNNEL_ENV_PORT:-8080}"
    ports:
      - "3000:${FRONTEND_ENV_PORT:-8080}"
    depends_on:
      cc-tunnel:
        condition: service_started

volumes:
  pgdata:
