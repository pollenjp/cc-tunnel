services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cctunnel
      POSTGRES_USER: cctunnel
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-cctunnel_dev}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cctunnel -d cctunnel"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    expose:
      - "5432"

  cc-remote-agent:
    build:
      context: ./cc-remote-agent
    environment:
      PORT: "${CC_REMOTE_AGENT_ENV_PORT:-9091}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    volumes:
      - claude-sessions:/root/.claude
    expose:
      - "${CC_REMOTE_AGENT_ENV_PORT:-9091}"

  cc-tunnel:
    build:
      context: ./cc-tunnel
    command:
      - -agent-url
      - http://cc-remote-agent:${CC_REMOTE_AGENT_ENV_PORT:-9091}
    environment:
      PORT: ${CC_TUNNEL_ENV_PORT:-8080}
      DATABASE_URL: "postgres://cctunnel:${POSTGRES_PASSWORD:-cctunnel_dev}@postgres:5432/cctunnel?sslmode=disable"
    expose:
      - "${CC_TUNNEL_ENV_PORT:-8080}"
    depends_on:
      cc-remote-agent:
        condition: service_started
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      PORT: "${FRONTEND_ENV_PORT:-8080}"
      BACKEND_URL: "/api"
      API_UPSTREAM: "http://cc-tunnel:${CC_TUNNEL_ENV_PORT:-8080}"
    ports:
      - "3000:${FRONTEND_ENV_PORT:-8080}"
    depends_on:
      cc-tunnel:
        condition: service_started

volumes:
  pgdata:
  claude-sessions:
