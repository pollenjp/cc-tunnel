name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-cc-tunnel:
    name: "cc-tunnel: test"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: cctunnel
          POSTGRES_USER: cctunnel
          POSTGRES_PASSWORD: cctunnel_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cctunnel -d cctunnel"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
          --health-start-period 10s
    env:
      DATABASE_URL: postgres://cctunnel:cctunnel_dev@localhost:5432/cctunnel?sslmode=disable
    defaults:
      run:
        working-directory: apps/cc-tunnel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/cc-tunnel/go.mod

      - name: Test
        run: go test ./...

  lint-cc-tunnel:
    name: "cc-tunnel: lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/cc-tunnel/go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: apps/cc-tunnel

  test-cc-remote-agent:
    name: "cc-remote-agent: test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cc-remote-agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/cc-remote-agent/go.mod

      - name: Test
        run: go test ./...

  lint-cc-remote-agent:
    name: "cc-remote-agent: lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/cc-remote-agent/go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: apps/cc-remote-agent

  test-frontend:
    name: "frontend: test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

  lint-frontend:
    name: "frontend: lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit
