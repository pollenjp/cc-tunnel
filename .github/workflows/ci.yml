name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-cc-tunnel:
    name: "cc-tunnel: test"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: cctunnel
          POSTGRES_USER: cctunnel
          POSTGRES_PASSWORD: cctunnel_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cctunnel -d cctunnel"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
          --health-start-period 10s
    env:
      DATABASE_URL: postgres://cctunnel:cctunnel_dev@localhost:5432/cctunnel?sslmode=disable
    defaults:
      run:
        working-directory: apps/cc-tunnel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  lint-cc-tunnel:
    name: "cc-tunnel: lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4
          working-directory: apps/cc-tunnel

  test-cc-remote-agent:
    name: "cc-remote-agent: test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cc-remote-agent
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  lint-cc-remote-agent:
    name: "cc-remote-agent: lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4
          working-directory: apps/cc-remote-agent

  test-frontend:
    name: "frontend: test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

  lint-frontend:
    name: "frontend: lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

  validate-terraform:
    name: "terraform: validate"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # terragrunt は HCL の構文チェックに terraform 本体を必要としないので
      # terragrunt のみインストールする。バージョンは mise.toml に追従。
      - name: Install terragrunt
        run: |
          set -euxo pipefail
          curl -sSfL -o /tmp/terragrunt \
            https://github.com/gruntwork-io/terragrunt/releases/download/v1.0.2/terragrunt_linux_amd64
          sudo install -m 0755 /tmp/terragrunt /usr/local/bin/terragrunt
          terragrunt --version

      - name: terragrunt hcl fmt --check
        run: terragrunt hcl fmt --check

      - name: terragrunt hcl validate
        run: terragrunt hcl validate
